<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>llama.cpp API 启动器 — 登录</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="login-body">
    <div class="login-card">
        <h1>llama.cpp API 启动器</h1>
        <p class="login-sub">管理员登录</p>

        <!-- 视图一：登录表单 -->
        <div id="viewLogin" style="display:none;">
            <div class="login-error" id="loginError"></div>
            <div class="form-row">
                <label>管理员密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码"
                       onkeydown="if(event.key==='Enter'){event.preventDefault();App.doLogin();}">
            </div>
            <button class="btn-primary" id="loginBtn" onclick="App.doLogin()">登录</button>
        </div>

        <!-- 视图二：首次设置密码（本机） -->
        <div id="viewSetup" style="display:none;">
            <h2 id="setupTitle" style="font-size:.95rem; margin-bottom:10px;"></h2>
            <div class="login-info">检测到尚未设置管理员密码。请设置一个密码以保护远程管理操作。</div>
            <div class="login-error" id="setupError"></div>
            <div class="form-row">
                <label>设置密码</label>
                <input type="password" id="setupPassword" placeholder="至少 6 位">
            </div>
            <div class="form-row">
                <label>确认密码</label>
                <input type="password" id="setupConfirm" placeholder="再次输入"
                       onkeydown="if(event.key==='Enter'){event.preventDefault();App.doSetup();}">
            </div>
            <button class="btn-primary" id="setupBtn" onclick="App.doSetup()">设置并登录</button>
        </div>

        <!-- 视图三：远程访问但密码未设 -->
        <div id="viewRemote" style="display:none;">
            <div class="login-info">
                管理员密码尚未初始化。出于安全考虑，首次设置密码仅允许<b>本机</b>操作。<br><br>
                请在运行启动器的机器上，通过浏览器访问 <code>http://127.0.0.1:8686</code> 完成首次设置。
            </div>
        </div>

        <div class="login-foot">llama.cpp API 启动器 · 管理员认证</div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // 首屏判断
        App.handleAuthRedirect();
    </script>
</body>
</html>
