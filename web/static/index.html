    <title>llama.cpp API 启动器</title>
    <style>
        :root{
            --bg:#ffffff; --panel:#f5f5f5; --input:#ffffff; --border:#c8c8c8;
            --text:#000000; --muted:#666666; --accent:#0058a3; --accent-h:#003f7a;
            --ok:#0a7a32; --ok-h:#085a26; --err:#c3272b; --err-h:#9a1f23;
            --warn:#8a5a00; --hover:#eaeaea; --row-line:#e0e0e0;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
            background:var(--bg); color:var(--text); line-height:1.45;
        }
        /* 顶栏面板 */
        .header{
            background:var(--panel); padding:8px 12px; border-bottom:1px solid var(--border);
            display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap;
            position:sticky; top:0; z-index:10;
        }
        .header-left{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
        .header h1{font-size:1rem; font-weight:600; color:var(--text);}
        .status{font-size:.78rem; padding:2px 8px; background:var(--border); color:var(--text);}
        .status.running{background:var(--ok); color:#fff;}
        .status.stopped{background:var(--err); color:#fff;}
        .api-badge{font-size:.72rem; padding:2px 6px; background:var(--accent); color:#fff; cursor:pointer; border:none;}
        .api-badge:disabled{background:var(--border); color:var(--muted); cursor:default;}
        .header-btn{
            padding:6px 18px; border:1px solid var(--border); background:var(--input);
            color:var(--text); font-size:.85rem; cursor:pointer; min-width:90px;
        }
        .header-btn.start{background:var(--ok); border-color:var(--ok); color:#fff;}
        .header-btn.start:hover{background:var(--ok-h);}
        .header-btn.stop{background:var(--err); border-color:var(--err); color:#fff;}
        .header-btn.stop:hover{background:var(--err-h);}
        .header-btn:disabled{background:var(--input); border-color:var(--border); cursor:not-allowed; color:var(--muted);}
        /* 主区域 */
        .main{padding:10px; max-width:900px; margin:0 auto;}
        .section{background:var(--panel); border:1px solid var(--border); padding:10px; margin-bottom:10px;}
        .section-title{
            font-size:.78rem; font-weight:600; color:var(--muted); margin-bottom:8px;
            display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px;
        }
        .form-row{display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap;}
        .form-row:last-child{margin-bottom:0;}
        .form-row label{font-size:.85rem; flex-shrink:0;}
        .form-row input[type=text], .form-row input[type=number], .form-row select, .form-row textarea{
            flex:1; min-width:120px; padding:5px 6px; border:1px solid var(--border);
            background:var(--input); color:var(--text); font-size:.85rem; font-family:inherit;
        }
        .form-row textarea{min-height:60px; resize:vertical;}
        .form-row input:focus, .form-row select:focus, .form-row textarea:focus{outline:none; border-color:var(--accent);}
        .form-row input[readonly]{background:var(--panel); color:var(--muted);}
        .form-row button, .small-btn{
            padding:5px 10px; border:1px solid var(--accent); background:var(--accent);
            color:#fff; font-size:.85rem; cursor:pointer;
        }
        .form-row button:hover{background:var(--accent-h);}
        .form-row button:disabled{background:var(--input); border-color:var(--border); color:var(--muted); cursor:not-allowed;}
        .detect-label{font-size:.85rem; font-weight:600;}
        .detect-label.ok{color:var(--ok);}
        .detect-label.bad{color:var(--err);}
        .btn-secondary{background:var(--input); border-color:var(--border); color:var(--text);}
        .btn-secondary:hover{background:var(--hover);}
        .btn-primary{background:var(--accent); border:1px solid var(--accent); color:#fff;}
        .btn-primary:hover{background:var(--accent-h);}
        .btn-primary:disabled{background:var(--input); border-color:var(--border); color:var(--muted); cursor:not-allowed;}
        .btn-danger{background:var(--err); border:1px solid var(--err); color:#fff;}
        .btn-danger:hover{background:var(--err-h);}
        .btn-danger:disabled{background:var(--input); border-color:var(--border); color:var(--muted); cursor:not-allowed;}
        .clear-btn{padding:2px 8px; font-size:.75rem; background:var(--input); border:1px solid var(--border); color:var(--text); cursor:pointer;}
        .clear-btn:hover{background:var(--hover);}
        /* 复选行 */
        .check-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:4px 12px; margin-bottom:6px;}
        .check-grid label{font-size:.82rem; display:flex; align-items:center; gap:4px; cursor:pointer;}
        /* 健康检查结果 */
        .hc-box{font-size:.8rem; margin-top:6px;}
        .hc-box .hc-err{color:var(--err); margin-bottom:2px;}
        .hc-box .hc-warn{color:var(--warn); margin-bottom:2px;}
        .hc-box .hc-ok{color:var(--ok);}
        /* 日志面板 */
        .log-toolbar{display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:6px;}
        .log-toolbar select, .log-toolbar label{font-size:.75rem;}
        .log-panel{
            background:var(--input); border:1px solid var(--border); height:240px; overflow-y:auto;
            padding:6px; font-family:Consolas,Monaco,'Courier New',monospace; font-size:.78rem;
        }
        .log-line{margin-bottom:1px; white-space:pre-wrap; word-break:break-all;}
        .log-line.out{color:var(--text);}
        .log-line.err{color:#a30000;}
        .log-line.cmd{color:var(--accent);}
        .log-line.rc{color:#8a5a00;}
        .log-line.hidden{display:none;}
        /* API 工作台 */
        .tabs{display:flex; border-bottom:1px solid var(--border); margin-bottom:8px;}
        .tab{padding:6px 14px; border:1px solid transparent; border-bottom:none; background:var(--input);
             color:var(--muted); cursor:pointer; font-size:.82rem; margin-right:2px;}
        .tab.active{background:var(--panel); color:var(--text); border-color:var(--border); font-weight:600;}
        .tab:hover:not(.active){background:var(--hover);}
        .tab-pane{display:none;}
        .tab-pane.active{display:block;}
        .chat-window{background:var(--input); border:1px solid var(--border); height:220px; overflow-y:auto; padding:6px; font-size:.82rem;}
        .chat-msg{margin-bottom:6px; padding:4px 6px; border-left:3px solid var(--border);}
        .chat-msg.user{border-left-color:var(--accent);}
        .chat-msg.assistant{border-left-color:var(--ok);}
        .chat-msg.system{border-left-color:var(--warn); color:var(--muted);}
        .chat-msg .role{font-size:.72rem; color:var(--muted); font-weight:600;}
        .chat-msg .content{white-space:pre-wrap; word-break:break-word;}
        .json-out{background:var(--input); border:1px solid var(--border); padding:6px;
                  font-family:Consolas,Monaco,monospace; font-size:.76rem; white-space:pre-wrap; word-break:break-all;
                  max-height:200px; overflow-y:auto;}
        .code-block{background:var(--input); border:1px solid var(--border); padding:6px;
                    font-family:Consolas,Monaco,monospace; font-size:.76rem; white-space:pre; overflow-x:auto;}
        .copy-btn{padding:2px 8px; font-size:.72rem; background:var(--input); border:1px solid var(--border); color:var(--text); cursor:pointer;}
        .copy-btn:hover{background:var(--hover);}
        .msg-row{display:flex; align-items:flex-start; gap:4px; margin-bottom:4px;}
        .msg-row select{width:auto; min-width:90px; flex:0 0 auto;}
        .msg-row input{flex:1;}
        .msg-row button{padding:4px 8px;}
        /* 弹窗 */
        .modal-overlay{
            position:fixed; inset:0; background:rgba(0,0,0,.4); display:none;
            justify-content:center; align-items:center; z-index:1000; padding:10px;
        }
        .modal-overlay.show{display:flex;}
        .modal{
            background:var(--bg); border:1px solid var(--border); width:100%; max-width:720px;
            max-height:90vh; overflow:hidden; display:flex; flex-direction:column;
        }
        .modal-header{
            padding:10px 12px; border-bottom:1px solid var(--border); background:var(--panel);
            display:flex; justify-content:space-between; align-items:center;
        }
        .modal-header h2{font-size:.95rem;}
        .modal-header button{background:none; border:none; color:var(--muted); font-size:1.2rem; line-height:1; cursor:pointer;}
        .modal-header button:hover{color:var(--text);}
        .modal-body{padding:10px; overflow-y:auto; flex:1;}
        .modal-footer{
            padding:10px; border-top:1px solid var(--border); background:var(--panel);
            display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;
        }
        .modal-footer .progress-bar{flex:1; min-width:100px; height:18px; background:var(--input); border:1px solid var(--border);}
        .modal-footer .progress-fill{height:100%; background:var(--accent);}
        .split-panel{display:flex; gap:10px;}
        .split-panel>div{flex:1; min-width:0;}
        .list-box{background:var(--input); border:1px solid var(--border); overflow-y:auto;}
        .list-box div{
            padding:5px 6px; cursor:pointer; font-size:.78rem;
            border-bottom:1px solid var(--row-line); word-break:break-all;
        }
        .list-box div:last-child{border-bottom:none;}
        .list-box div:hover{background:var(--hover);}
        .list-box div.selected{background:var(--accent); color:#fff;}
        #browserList{height:300px;}
        #releaseList, #assetList{height:200px;}
        #configsList{height:240px;}
        #promptList{height:220px;}
        .text-center{text-align:center; color:var(--muted); padding:10px;}
        .browser-path-row{display:flex; gap:6px; margin-bottom:8px;}
        .browser-path-row input{flex:1; min-width:0;}
        .warn-box{background:#fff8e1; border:1px solid #e0c060; padding:6px 8px; font-size:.78rem; color:var(--warn); margin-bottom:6px;}
        .info-line{font-size:.78rem; color:var(--muted); margin-bottom:4px;}
        .info-line code{background:var(--panel); padding:1px 4px; font-family:Consolas,monospace; font-size:.76rem;}
        /* API Key 表格 */
        .keys-table{width:100%; border-collapse:collapse; font-size:.8rem; background:var(--input);}
        .keys-table th, .keys-table td{border:1px solid var(--border); padding:5px 6px; text-align:left; vertical-align:middle; word-break:break-all;}
        .keys-table th{background:var(--panel); color:var(--muted); font-weight:600; font-size:.76rem;}
        .keys-table td .row-btn{padding:2px 6px; font-size:.72rem; margin-right:2px; cursor:pointer; border:1px solid var(--border); background:var(--input); color:var(--text);}
        .keys-table td .row-btn:hover{background:var(--hover);}
        .keys-table td .row-btn.danger{color:var(--err); border-color:var(--err);}
        .keys-table td .row-btn.danger:hover{background:var(--err); color:#fff;}
        .key-badge{font-size:.7rem; padding:1px 5px; border:1px solid var(--border); background:var(--panel);}
        .key-badge.ok{color:var(--ok); border-color:var(--ok);}
        .key-badge.off{color:var(--muted);}
        .key-plaintext{
            font-family:Consolas,Monaco,monospace; font-size:1rem; font-weight:600;
            background:var(--input); border:1px solid var(--border); padding:8px 10px;
            word-break:break-all; user-select:all;
        }
        /* 响应式：窄屏纵向堆叠、控件全宽 */
        @media (max-width:640px){
            .main{padding:8px;}
            .form-row{flex-direction:column; align-items:stretch;}
            .form-row label{width:auto;}
            .form-row input[type=text], .form-row input[type=number], .form-row select, .form-row textarea{width:100%;}
            .form-row button, .small-btn{width:100%;}
            #hostInput, #portInput{flex:1 1 auto !important; width:100%;}
            .split-panel{flex-direction:column;}
            .browser-path-row{flex-direction:column;}
            .browser-path-row input{width:100%;}
            .log-panel{height:180px;}
            .chat-window{height:180px;}
            #browserList{height:260px;}
            #releaseList, #assetList{height:160px;}
            #configsList{height:200px;}
            #promptList{height:180px;}
            .keys-table{display:block; overflow-x:auto; white-space:nowrap;}
            .keys-table thead, .keys-table tbody, .keys-table tr{display:table; width:auto;}
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>llama.cpp API 启动器</h1>
            <span class="status stopped" id="statusLabel">未运行</span>
            <button class="api-badge" id="apiBadge" disabled title="点击复制 API 地址" onclick="copyApiBase()">API: -</button>
        </div>
        <button class="header-btn start" id="toggleBtn" onclick="toggleServer()">▶ 启动</button>
    </div>

    <div class="main">
        <!-- 路径设置 -->
        <div class="section">
            <div class="section-title"><span>路径设置</span></div>
            <div class="form-row">
                <label>llama.cpp：</label>
                <input type="text" id="llamacppDir" placeholder="选择 llama.cpp 目录">
                <button onclick="openBrowser('llamacppDir','dir')">浏览…</button>
                <span class="detect-label bad" id="detectLabel">✗ 未设置</span>
                <button class="btn-secondary" onclick="openVersionManager()">版本管理</button>
            </div>
            <div class="form-row">
                <label>模型目录：</label>
                <input type="text" id="modelDir" placeholder="选择模型目录">
                <button onclick="openBrowser('modelDir','dir')">浏览…</button>
            </div>
            <div class="form-row">
                <label>参数方案：</label>
                <input type="text" id="profilesPath" readonly placeholder="选择方案文件">
                <button onclick="openBrowser('profilesPath','file')">选择…</button>
                <button class="btn-secondary" onclick="showConfigsList()">方案集</button>
                <button class="btn-secondary" onclick="openProfileEditor()">编辑方案</button>
            </div>
        </div>

        <!-- 安全设置 -->
        <div class="section">
            <div class="section-title"><span>安全设置</span></div>
            <div id="remoteWarn" class="warn-box" style="display:none;">⚠ 检测到远程访问模式（host=0.0.0.0）。强烈建议设置管理 token，否则任何能访问该端口的人均可启停服务。</div>
            <div class="form-row">
                <label>主控 Token（兼容旧版）：</label>
                <input type="text" id="authToken" placeholder="留空=仅本机可操作危险接口">
                <button onclick="saveToken()">保存</button>
                <span id="authState" class="info-line" style="flex:0 0 auto;"></span>
            </div>

            <!-- API Key 管理 -->
            <div class="section-title" style="margin-top:10px;">
                <span>API Key 管理</span>
                <span>
                    <button class="btn-primary" onclick="showCreateKeyDialog()">+ 新建 Key</button>
                    <button class="btn-secondary" onclick="loadKeys()">刷新</button>
                </span>
            </div>
            <div class="info-line">新体系支持多 Key：可生成、命名、启停、回收。明文仅创建时显示一次。<code>/v1/*</code> API 及远程访问均需携带 <code>Authorization: Bearer sk-...</code>。</div>
            <table class="keys-table">
                <thead><tr>
                    <th>标签</th><th>前缀</th><th>作用域</th><th>状态</th>
                    <th>创建时间</th><th>最近使用</th><th>操作</th>
                </tr></thead>
                <tbody id="keysBody">
                    <tr><td colspan="7" class="text-center">暂无 API Key</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 运行配置 -->
        <div class="section">
            <div class="section-title"><span>运行配置</span></div>
            <div class="form-row">
                <label>模型：</label>
                <select id="modelSelect"></select>
                <label>方案：</label>
                <select id="profileSelect"></select>
            </div>
            <div class="form-row">
                <label>监听地址：</label>
                <input type="text" id="hostInput" value="127.0.0.1" style="flex:0 0 160px;">
                <label style="width:50px;">端口：</label>
                <input type="text" id="portInput" value="8080" style="flex:0 0 80px;">
            </div>
            <div class="form-row">
                <button class="btn-secondary" onclick="runHealthcheck()">启动前检查</button>
                <span id="hcSummary" class="info-line"></span>
            </div>
            <div id="hcBox" class="hc-box" style="display:none;"></div>
        </div>

        <!-- API 工作台 -->
        <div class="section">

                <span>API 工作台</span>

                    <span id="apiModelLabel" class="info-line"></span>
                    <button class="clear-btn" onclick="loadEndpoints()">刷新</button>
                </span>
            </div>
            <div class="form-row" style="margin-bottom:6px;">
                <label>API Key：</label>
                <input type="password" id="v1ApiKey" placeholder="sk-..." style="flex:1;"
                       value="" oninput="saveV1Key()">
                <button class="btn-secondary small-btn" onclick="fillV1KeyFromList()">填入…</button>
            </div>
            <div class="info-line" id="endpointsInfo">未运行</div>
            <div class="tabs" style="margin-top:8px;">

                <div class="tab" data-tab="embeddings" onclick="switchTab('embeddings')">Embeddings</div>
                <div class="tab" data-tab="rerank" onclick="switchTab('rerank')">Reranking</div>
                <div class="tab" data-tab="models" onclick="switchTab('models')">模型</div>
                <div class="tab" data-tab="examples" onclick="switchTab('examples')">调用示例</div>
                <div class="tab" data-tab="prompts" onclick="switchTab('prompts')">Prompt 模板</div>
            </div>

            <!-- Chat -->
            <div class="tab-pane active" id="pane-chat">
                <div class="chat-window" id="chatWindow"></div>
                <div id="chatMessages" style="display:none;"></div>
                <div class="form-row" style="margin-top:6px;">
                    <label>系统提示：</label>
                    <input type="text" id="chatSystem" placeholder="（可选）你是一个有用的助手">
                </div>
                <div class="form-row">
                    <label>输入：</label>
                    <input type="text" id="chatInput" placeholder="输入消息后回车发送" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}">
                    <button onclick="sendChat()">发送</button>
                    <button class="btn-secondary" onclick="clearChat()">清空</button>
                </div>
                <div class="form-row">
                    <label>temperature：</label>
                    <input type="number" id="chatTemp" value="0.7" min="0" max="2" step="0.1" style="flex:0 0 80px;">
                    <label>max_tokens：</label>
                    <input type="number" id="chatMaxTokens" value="-1" min="-1" step="1" style="flex:0 0 80px;" title="-1 表示自动">
                    <label>stream：</label>
                    <select id="chatStream" style="flex:0 0 auto;"><option value="false">否</option><option value="true">是</option></select>
                </div>
            </div>

            <!-- Embeddings -->
            <div class="tab-pane" id="pane-embeddings">
                <div class="form-row">
                    <label>输入文本：</label>
                    <textarea id="embInput" placeholder="一行一个文本，或多行用换行分隔"></textarea>
                </div>
                <div class="form-row">
                    <button onclick="sendEmbeddings()">生成向量</button>
                    <button class="btn-secondary" onclick="document.getElementById('embOutput').textContent=''">清空结果</button>
                </div>
                <div class="json-out" id="embOutput">（结果将显示于此）</div>
            </div>

            <!-- Reranking -->
            <div class="tab-pane" id="pane-rerank">

    <script>
        // -------------------- 全局状态 --------------------
        const MAX_LOG_LINES = 500;
        const SSE_MAX_DELAY = 15000;
        let releases = [];
        let currentAssets = [];
        let selectedReleaseIndex = -1;
        let selectedAssetIndex = -1;
        let eventSource = null;
        let sseReconnectDelay = 1000;
        let isRunning = false;
        let statusPollTimer = null;
        let isProcessing = false;
        let browserContext = { inputId: '', mode: 'dir', currentPath: '', parent: '' };
        let chatHistory = [];
        let currentExamples = {};
        let currentPrompts = [];
        let selectedPromptName = '';
        let apiBaseUrl = '';

        // -------------------- API 工具 --------------------
        async function apiGet(url) {
            const resp = await fetch(url);
            return await resp.json();
        }
        async function apiPost(url, data) {
            const resp = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return await resp.json();
        }
        async function apiDelete(url) {
            const resp = await fetch(url, { method: 'DELETE' });
            return await resp.json();
        }

        // -------------------- /v1/* 调用工具（OpenAI 兼容，需 sk- Key）--------------------
        function getV1Key() {
            return localStorage.getItem('v1_api_key') || '';
        }
        function saveV1Key() {
            const v = document.getElementById('v1ApiKey').value.trim();
            localStorage.setItem('v1_api_key', v);
        }
        function initV1KeyInput() {
            document.getElementById('v1ApiKey').value = getV1Key();
        }
        function requireV1Key() {
            const k = getV1Key();
            if (!k) { alert('请先在 API 工作台填入 sk- 开头的 API Key'); return null; }
            return k;
        }
        async function v1Fetch(path, options = {}) {
            const key = requireV1Key();
            if (!key) return null;
            const headers = Object.assign({
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + key,
            }, options.headers || {});
            return await fetch(path, Object.assign({}, options, { headers }));
        }
        async function v1Get(path) {
            const resp = await v1Fetch(path);
            if (!resp) return { error: '无 API Key' };
            return await resp.json();
        }
        async function v1Post(path, data) {
            const resp = await v1Fetch(path, {
                method: 'POST',
                body: JSON.stringify(data),
            });
            if (!resp) return { error: '无 API Key' };
            return await resp.json();
        }
        function fillV1KeyFromList() {
            const k = prompt('粘贴 sk- 开头的 API Key 明文（可在「安全设置」创建后复制）：');
            if (k) {
                document.getElementById('v1ApiKey').value = k.trim();
                saveV1Key();
            }
        }
        // 兼容 OpenAI 对象错误格式与旧字符串格式
        function extractErrorMsg(r) {
            if (!r || !r.error) return '';
            if (typeof r.error === 'string') return r.error;
            if (typeof r.error === 'object') return r.error.message || JSON.stringify(r.error);
            return String(r.error);
        }

        // -------------------- 配置加载 --------------------
        async function loadConfig() {
            const config = await apiGet('/api/config');
            document.getElementById('llamacppDir').value = config.llamacpp_dir || '';
            document.getElementById('modelDir').value = config.model_dir || '';
            document.getElementById('profilesPath').value = config.profiles_path || '';
            document.getElementById('hostInput').value = config.host || '127.0.0.1';
            document.getElementById('portInput').value = config.port || 8080;

            const detectLabel = document.getElementById('detectLabel');
            detectLabel.textContent = config.detect_msg;
            detectLabel.className = `detect-label ${config.detect_status}`;

            // 安全状态
            document.getElementById('authState').textContent =
                config.auth_enabled ? '已启用' : '未启用（仅本机）';
            document.getElementById('remoteWarn').style.display =
                config.remote_access ? 'block' : 'none';

            await loadModels();
            await loadProfiles();
            selectOption('modelSelect', config.last_model);
            selectOption('profileSelect', config.current_profile);
        }

        function selectOption(id, value) {
            const sel = document.getElementById(id);
            for (let i = 0; i < sel.options.length; i++) {
                if (sel.options[i].value === value) {
                    sel.selectedIndex = i;
                    return;
                }
            }
        }

        async function loadModels() {
            const models = await apiGet('/api/models');
            const sel = document.getElementById('modelSelect');
            sel.innerHTML = '';
            models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m; opt.textContent = m;
                sel.appendChild(opt);
            });
        }

        async function loadProfiles() {
            const profiles = await apiGet('/api/profiles');
            const sel = document.getElementById('profileSelect');
            sel.innerHTML = '';
            (profiles.names || []).forEach(n => {
                const opt = document.createElement('option');
                opt.value = n; opt.textContent = n;
                sel.appendChild(opt);
            });
        }

        // -------------------- 目录浏览器 --------------------
        function openBrowser(inputId, mode) {
            browserContext = {
                inputId, mode,
                currentPath: document.getElementById(inputId).value || '',
                parent: ''
            };
            document.getElementById('browserTitle').textContent = mode === 'dir' ? '选择目录' : '选择文件';
            document.getElementById('browserConfirmBtn').textContent = mode === 'dir' ? '选择此目录' : '选择此文件';
            document.getElementById('browserModal').classList.add('show');
            browserNavigate(browserContext.currentPath);
        }

        function closeBrowser() {
            document.getElementById('browserModal').classList.remove('show');
        }

        async function browserNavigate(path) {
            const resp = await apiGet('/api/browse?path=' + encodeURIComponent(path || ''));
            browserContext.currentPath = resp.path || '';
            browserContext.parent = resp.parent || '';
            document.getElementById('browserPath').value = resp.path || '(根)';
            document.getElementById('browserError').textContent = resp.error || '';
            document.getElementById('browserUpBtn').disabled = !resp.parent;

            const list = document.getElementById('browserList');
            list.innerHTML = '';
            (resp.entries || []).forEach(e => {
                const div = document.createElement('div');
                const icon = e.type === 'dir' ? '📁 ' : '📄 ';
                div.textContent = icon + e.name;
                div.dataset.name = e.name;
                div.dataset.type = e.type;
                div.onclick = () => onBrowserItemClick(e, resp);
                list.appendChild(div);
            });
        }

        function onBrowserItemClick(entry, resp) {
            if (entry.type === 'dir') {
                const next = resp.path ? joinPath(resp.path, entry.name) : entry.name;
                browserNavigate(next);
            } else {
                document.querySelectorAll('#browserList div').forEach(d => d.classList.remove('selected'));
                event.currentTarget.classList.add('selected');
            }
        }

        function joinPath(base, name) {
            if (base.endsWith('\\') || base.endsWith('/')) return base + name;
            return base + '/' + name;
        }

        function browserGoUp() {
            if (browserContext.parent !== undefined) browserNavigate(browserContext.parent);
        }

        function browserRefresh() {
            browserNavigate(browserContext.currentPath);
        }

        function browserConfirm() {
            const { inputId, mode, currentPath } = browserContext;
            let selected = currentPath;
            if (mode === 'file') {
                const sel = document.querySelector('#browserList div.selected');
                if (!sel) { alert('请先选择文件'); return; }
                selected = currentPath ? joinPath(currentPath, sel.dataset.name) : sel.dataset.name;
            } else {
                if (!selected) { alert('请先进入一个目录'); return; }
            }
            document.getElementById(inputId).value = selected;
            closeBrowser();
            if (inputId === 'llamacppDir' || inputId === 'modelDir') onPathChanged();
            else if (inputId === 'profilesPath') onProfilesPathChanged(selected);
        }

        // -------------------- 路径变更 --------------------
        async function onPathChanged() {
            const config = {
                llamacpp_dir: document.getElementById('llamacppDir').value,
                model_dir: document.getElementById('modelDir').value,
            };
            const result = await apiPost('/api/config', config);
            const detectLabel = document.getElementById('detectLabel');
            detectLabel.textContent = result.detect_msg;
            detectLabel.className = `detect-label ${result.detect_status}`;
            await loadModels();
        }

        async function onProfilesPathChanged(path) {
            await apiPost('/api/profiles/path', { path });
            await loadProfiles();
        }

        async function showConfigsList() {
            const files = await apiGet('/api/configs/list');
            const list = document.getElementById('configsList');
            list.innerHTML = '';
            if (!files.length) {
                list.innerHTML = '<div class="text-center">configs 目录下暂无配置文件</div>';
            } else {
                files.forEach(f => {
                    const div = document.createElement('div');
                    div.textContent = f;
                    div.dataset.filename = f;
                    list.appendChild(div);
                });
            }
            document.getElementById('configsModal').classList.add('show');
        }

        function closeConfigsList() {
            document.getElementById('configsModal').classList.remove('show');
        }

        async function selectConfigFile(event) {
            const target = event.target;
            if (!target.dataset.filename) return;
            await apiPost('/api/configs/load/' + target.dataset.filename);
            await loadProfiles();
            await loadConfig();
            closeConfigsList();
        }

        // -------------------- 安全设置 --------------------
        async function saveToken() {
            const token = document.getElementById('authToken').value;
            const result = await apiPost('/api/config', { auth_token: token });
            if (result.error) { alert(result.error); return; }
            document.getElementById('authState').textContent =
                result.auth_enabled ? '已启用' : '未启用（仅本机）';
            alert(result.auth_enabled ? 'Token 已保存。远程访问危险接口需携带 Authorization: Bearer <token>。' : 'Token 已清空，仅本机可操作危险接口。');
        }

        // -------------------- API Key 管理 --------------------
        let currentKeys = [];   // 当前 Key 列表（不含 hash/plaintext）
        let renameKeyId = '';

        function formatTime(ts) {
            if (!ts) return '—';
            return new Date(ts * 1000).toLocaleString();
        }

        function escapeHtml(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        async function loadKeys() {
            const keys = await apiGet('/api/keys');
            renderKeys(keys || []);
        }

        function findKey(id) {

        // -------------------- 服务控制（启停合一）--------------------
        async function toggleServer() {
            if (isProcessing) return;

        async function startServer() {
            const model = document.getElementById('modelSelect').value;
            const profile = document.getElementById('profileSelect').value;
            const host = document.getElementById('hostInput').value;
            const port = document.getElementById('portInput').value;
            if (!model) { alert('请选择模型'); return; }
            if (!profile) { alert('请选择参数方案'); return; }

            const result = await apiPost('/api/start', { model, profile, host, port });
            if (result.error) { alert(result.error); return; }
            if (result.command) addLog(result.command, 'cmd');
            updateStatus(true);
            startLogStream();
            startStatusPoll();
            loadEndpoints();
        }

        async function stopServer() {
            const result = await apiPost('/api/stop', { force: true });
            if (result.error) { alert(result.error); return; }
            addLog('[已强制停止]', 'rc');
            updateStatus(result.running);
            if (!result.running) stopStatusPoll();
            loadEndpoints();

        function updateStatus(running) {
            isRunning = running;
            const statusLabel = document.getElementById('statusLabel');
            const toggleBtn = document.getElementById('toggleBtn');
            const apiBadge = document.getElementById('apiBadge');
            if (running) {
                statusLabel.textContent = '运行中';
                statusLabel.className = 'status running';

                toggleBtn.className = 'header-btn stop';
                apiBadge.disabled = false;

                statusLabel.className = 'status stopped';
                toggleBtn.textContent = '▶ 启动';

        // -------------------- 状态轮询（仅运行时）--------------------
        function startStatusPoll() {
            if (statusPollTimer) clearInterval(statusPollTimer);
            statusPollTimer = setInterval(async () => {
                try {
                    const status = await apiGet('/api/status');
                    if (status.running !== isRunning) {
                        updateStatus(status.running);
                        if (!status.running) {
                            stopStatusPoll();
                            // 异常退出时展示退出码
                            if (status.exit_code !== null && status.exit_code !== undefined) {
                                addLog(`[退出码 ${status.exit_code}]`, 'rc');
                            }
                        }
                    }
                } catch (e) { /* 轮询失败忽略，下次重试 */ }
            }, 3000);
        }

        function stopStatusPoll() {
            if (statusPollTimer) {
                clearInterval(statusPollTimer);
                statusPollTimer = null;
            }
        }

        // -------------------- 日志流（SSE + 指数退避重连）--------------------
        function startLogStream() {
            if (eventSource) eventSource.close();
            eventSource = new EventSource('/api/logs');
            eventSource.onopen = () => { sseReconnectDelay = 1000; };
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.kind === 'rc') {
                    addLog(`[退出 ${data.data}]`, 'rc');
                    updateStatus(false);
                } else {
                    addLog(data.data, data.kind);
                }
            };
            eventSource.onerror = function() {
                eventSource.close();
                // 仅在服务仍运行时重连
                if (isRunning) {
                    setTimeout(() => {
                        sseReconnectDelay = Math.min(sseReconnectDelay * 2, SSE_MAX_DELAY);
                        startLogStream();
                    }, sseReconnectDelay);
                }
            };
        }

        // 日志面板：500 行硬上限，超出裁剪最旧的
        function addLog(text, kind) {
            const panel = document.getElementById('logPanel');
            const line = document.createElement('div');
            line.className = `log-line ${kind}`;
            line.dataset.kind = kind;
            line.textContent = text;
            // 应用当前过滤
            const filter = document.getElementById('logFilter').value;
            if (filter !== 'all' && filter !== kind) line.classList.add('hidden');
            panel.appendChild(line);
            while (panel.childElementCount > MAX_LOG_LINES) {
                panel.removeChild(panel.firstChild);
            }
            if (document.getElementById('autoscroll').checked) {
                panel.scrollTop = panel.scrollHeight;
            }
        }

            const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });

        // ---- Chat ----
        async function sendChat() {
            if (!isRunning) { alert('请先启动 llama-server'); return; }
            const input = document.getElementById('chatInput').value.trim();
            if (!input) return;
            const sys = document.getElementById('chatSystem').value.trim();
            const messages = [];
            if (sys) messages.push({ role: 'system', content: sys });
            chatHistory.push({ role: 'user', content: input });
            messages.push(...chatHistory);
            document.getElementById('chatInput').value = '';
            renderChat();
            const payload = {
                messages,
                temperature: parseFloat(document.getElementById('chatTemp').value),
                max_tokens: parseInt(document.getElementById('chatMaxTokens').value),
                stream: document.getElementById('chatStream').value === 'true',
            };
            if (payload.stream) {
                // SSE 流式：追加空 assistant 消息，逐步填充
                const assistantMsg = { role: 'assistant', content: '' };
                chatHistory.push(assistantMsg);
                renderChat();
                try {
                    const key = requireV1Key();
                    if (!key) { assistantMsg.content = '[错误] 无 API Key'; renderChat(); return; }
                    const resp = await fetch('/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + key,
                        },
                        body: JSON.stringify(payload),
                    });
                    if (!resp.ok) {
                        const err = await resp.json().catch(() => ({}));
                        assistantMsg.content = '[错误] ' + (extractErrorMsg(err) || resp.status);
                        renderChat();
                        return;
                    }
                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();  // 保留不完整行
                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue;
                            const data = line.slice(6);
                            if (data === '[DONE]') { buffer = ''; break; }
                            try {
                                const obj = JSON.parse(data);
                                const delta = obj.choices && obj.choices[0] && obj.choices[0].delta;
                                if (delta && delta.content) {
                                    assistantMsg.content += delta.content;
                                    renderChat();
                                }
                            } catch (e) { /* 忽略解析失败 */ }
                        }
                    }
                } catch (e) {
                    assistantMsg.content = '[请求异常] ' + e;
                    renderChat();
                }
            } else {
                // 非流式
                try {
                    const r = await v1Post('/v1/chat/completions', payload);
                    if (!r) return;
                    if (r.error) {
                        const msg = extractErrorMsg(r);
                        addLog('Chat 错误: ' + msg, 'err');
                        chatHistory.push({ role: 'assistant', content: '[错误] ' + msg });
                    } else {
                        const content = (r.choices && r.choices[0] && r.choices[0].message && r.choices[0].message.content) || JSON.stringify(r);
                        chatHistory.push({ role: 'assistant', content });
                    }
                } catch (e) {
                    chatHistory.push({ role: 'assistant', content: '[请求异常] ' + e });
                }
                renderChat();
            }
        }

        function renderChat() {
            const win = document.getElementById('chatWindow');
            win.innerHTML = '';
            chatHistory.forEach(m => {
                const div = document.createElement('div');
                div.className = `chat-msg ${m.role}`;
                div.innerHTML = `<div class="role">${m.role}</div><div class="content"></div>`;
                div.querySelector('.content').textContent = m.content;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        }

                dims: (d.embedding || []).length
            }));
            out.textContent = JSON.stringify({ model: r.model, count: (r.data||[]).length, preview: data }, null, 2);
        }

        async function loadProfileForEdit(name) {
            name = name || document.getElementById('editProfileName').value.trim();
            if (!name) return;
            const r = await apiGet('/api/profiles/get/' + encodeURIComponent(name));
            if (r.error) { alert(r.error); return; }
            const p = r.profile || {};
            document.getElementById('editProfileName').value = name;
            document.getElementById('f_context_size').value = p.context_size ?? 0;
            document.getElementById('f_parallel').value = p.parallel ?? 1;
            document.getElementById('f_batch_size').value = p.batch_size ?? 512;

            document.getElementById('f_gpu_layers').value = p.gpu_layers ?? 0;
            document.getElementById('f_threads').value = p.threads ?? 0;

            document.getElementById('f_embedding').checked = !!p.embedding;

        async function saveProfileFromForm() {
            const name = document.getElementById('editProfileName').value.trim();
            if (!name) { alert('请输入方案名'); return; }
            const profile = {
                context_size: parseInt(document.getElementById('f_context_size').value) || 0,
                parallel: parseInt(document.getElementById('f_parallel').value) || 0,
                batch_size: parseInt(document.getElementById('f_batch_size').value) || 0,
                ubatch_size: parseInt(document.getElementById('f_ubatch_size').value) || 0,
                gpu_layers: parseInt(document.getElementById('f_gpu_layers').value) || 0,
                threads: parseInt(document.getElementById('f_threads').value) || 0,
                flash_attn: document.getElementById('f_flash_attn').checked,
                cont_batching: document.getElementById('f_cont_batching').checked,
                mlock: document.getElementById('f_mlock').checked,
                no_mmap: document.getElementById('f_no_mmap').checked,
                embedding: document.getElementById('f_embedding').checked,
                reranking: document.getElementById('f_reranking').checked,
                jinja: document.getElementById('f_jinja').checked,
                verbose: document.getElementById('f_verbose').checked,
                pooling: document.getElementById('f_pooling').value,
                chat_template: document.getElementById('f_chat_template').value,
                draft_model: document.getElementById('f_draft_model').value,
                grammar_file: document.getElementById('f_grammar_file').value,
                extra_args: document.getElementById('f_extra_args').value,
            };
            const r = await apiPost('/api/profiles/save', { name, profile, set_current: true });
            const warnBox = document.getElementById('profileWarnings');
            if (r.error) { alert(r.error); return; }
            if (r.warnings && r.warnings.length) {
                warnBox.style.display = 'block';
                warnBox.innerHTML = r.warnings.map(w => `<div class="hc-warn">⚠ ${w}</div>`).join('');
            } else {
                warnBox.style.display = 'none';
            }
            // 刷新方案下拉
            await loadProfiles();
            selectOption('profileSelect', name);
            alert('方案已保存');
        }

        async function deleteProfileFromUI() {
            const name = document.getElementById('editProfileName').value.trim();
            if (!name) return;
            if (!confirm(`删除方案 "${name}"？`)) return;
            const r = await apiPost('/api/profiles/delete', { name });
            if (r.error) { alert(r.error); return; }
            await loadProfiles();
            closeProfileEditor();
            alert('已删除');
        }

        // -------------------- 版本管理 --------------------
        async function openVersionManager() {
            document.getElementById('versionModal').classList.add('show');
            await refreshCurrent();
            // 先识别本机平台并设置筛选器，再拉取发布列表
            const platform = await apiGet('/api/platform');
            document.getElementById('osFilter').value = platform.os || '全部';
            await checkUpdates();
            await refreshBackupStatus();

        function closeVersionManager() {

        async function refreshCurrent() {
            const config = await apiGet('/api/config');
            document.getElementById('currentDirLabel').textContent =
                `当前目录：${config.llamacpp_dir || '（未设置）'}  —  ${config.detect_msg}`;
        }

        async function refreshBackupStatus() {
            try {
                const r = await apiGet('/api/update/backup_status');
                const info = document.getElementById('backupInfo');
                const rb = document.getElementById('rollbackBtn');
                if (r.has_backup) {
                    info.textContent = '✓ 存在 _backup 备份，可回滚到上个版本';
                    info.style.color = 'var(--ok)';
                    rb.disabled = r.running;
                } else {
                    info.textContent = '✗ 无 _backup 备份（更新后才会生成）';
                    info.style.color = 'var(--muted)';
                    rb.disabled = true;
                }
            } catch (e) {}
        }

        async function checkUpdates() {
            const status = document.getElementById('updateStatus');
            status.textContent = '正在从 GitHub 获取发布列表…';
            document.getElementById('installBtn').disabled = true;
            try {
                // 始终拉取全部发布（os=全部），前端按 os_group 本地筛选，
                // 切换平台筛选无需重复请求 GitHub API（避免触发频率限制）
                const result = await apiGet('/api/releases?os=全部');
                if (result.error) throw new Error(result.error);
                releases = Array.isArray(result) ? result : [];
                const list = document.getElementById('releaseList');
                list.innerHTML = '';
                if (!releases.length) {
                    list.innerHTML = '<div class="text-center">未获取到版本</div>';
                    status.textContent = '未获取到版本';
                    return;
                }
                releases.forEach((r, i) => {
                    const div = document.createElement('div');
                    div.textContent = `${r.tag}  (${r.published})`;
                    div.dataset.index = i;
                    list.appendChild(div);
                });
                list.firstChild.classList.add('selected');
                selectedReleaseIndex = 0;
                await refreshAssets();
                status.textContent = `共 ${releases.length} 个版本`;
            } catch (e) {
                status.textContent = '获取失败';
                alert('获取失败：' + e);
            }
        }

        async function refreshAssets() {
            const list = document.getElementById('assetList');
            list.innerHTML = '';
            currentAssets = [];
            selectedAssetIndex = -1;
            document.getElementById('installBtn').disabled = true;
            if (selectedReleaseIndex < 0 || !releases[selectedReleaseIndex]) return;

            // 前端按当前平台筛选器本地过滤 os_group（避免重复请求 GitHub API）
            const osFilter = document.getElementById('osFilter').value;
            const groupMap = {"Windows": "windows", "Linux": "linux",
                              "macOS": "macos", "其他": "others"};
            const targetGroup = osFilter === '全部' ? '' : (groupMap[osFilter] || '');

            const release = releases[selectedReleaseIndex];
            for (const a of release.assets) {
                if (targetGroup && a.os_group !== targetGroup) continue;
                const div = document.createElement('div');
                div.textContent = `${a.name}  [${a.variant}]  ${(a.size / 1024).toFixed(0)}KB`;
                div.dataset.index = currentAssets.length;
                currentAssets.push(a);
                list.appendChild(div);
            }
            if (currentAssets.length > 0) {
                list.firstChild.classList.add('selected');
                selectedAssetIndex = 0;
                document.getElementById('installBtn').disabled = false;
            } else {
                const empty = document.createElement('div');
                empty.className = 'text-center';
                empty.textContent = osFilter === '全部' ? '无资产' : `该版本无 ${osFilter} 资产`;
                list.appendChild(empty);
            }
        }

        function selectRelease(event) {
            const target = event.target;
            if (!target.dataset.index) return;
            selectedReleaseIndex = parseInt(target.dataset.index);
            document.querySelectorAll('#releaseList div').forEach(d => d.classList.remove('selected'));
            target.classList.add('selected');
            refreshAssets();
        }

        function selectAsset(event) {
            const target = event.target;
            if (!target.dataset.index) return;
            selectedAssetIndex = parseInt(target.dataset.index);
            document.querySelectorAll('#assetList div').forEach(d => d.classList.remove('selected'));
            target.classList.add('selected');
            document.getElementById('installBtn').disabled = false;
        }

        async function installAsset() {
            if (selectedAssetIndex < 0 || !currentAssets[selectedAssetIndex]) return;
            const asset = currentAssets[selectedAssetIndex];
            const config = await apiGet('/api/config');
            if (!config.llamacpp_dir) { alert('未设置 llama.cpp 目录'); return; }

            const installBtn = document.getElementById('installBtn');
            const progressFill = document.getElementById('updateProgress');
            const status = document.getElementById('updateStatus');
            installBtn.disabled = true;
            document.getElementById('rollbackBtn').disabled = true;
            progressFill.style.width = '0%';
            status.textContent = '正在下载…';

            const result = await apiPost('/api/update', { url: asset.url, filename: asset.name });
            if (result.error) {
                alert(result.error);
                installBtn.disabled = false;
                status.textContent = '就绪';
                return;
            }

            const updateId = result.update_id;
            const checkProgress = async () => {
                const progress = await apiGet('/api/update/progress/' + updateId);
                if (progress.status === 'not_found') {
                    status.textContent = '更新任务未找到';
                    installBtn.disabled = false;
                    return;
                }
                progressFill.style.width = progress.progress + '%';
                if (progress.message) status.textContent = progress.message;
                if (progress.status === 'done') {
                    if (progress.success) {
                        progressFill.style.width = '100%';
                        status.textContent = '更新完成';
                        alert('更新完成');
                        await refreshCurrent();
                        await refreshBackupStatus();
                    } else {
                        alert('更新失败：' + progress.message);
                        status.textContent = '更新失败';
                    }
                    installBtn.disabled = false;
                    return;
                }
                setTimeout(checkProgress, 500);
            };
            checkProgress();
        }
